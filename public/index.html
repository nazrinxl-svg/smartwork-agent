<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - SmartWork Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      background: #eaf1fb;
      color: #061a40;
      display: flex;
      justify-content: center;
    }
    .phone {
      width: 430px;
      max-width: 100%;
      min-height: 100vh;
      padding: 42px 22px;
      background: linear-gradient(180deg, #f8fbff 0%, #edf5ff 100%);
      display: flex;
      align-items: center;
    }
    .card {
      width: 100%;
      background: #fff;
      border: 1px solid #dbe7f7;
      border-radius: 28px;
      padding: 28px 22px;
      box-shadow: 0 24px 70px rgba(15, 47, 96, .12);
      text-align: center;
    }
    .logo {
      width: 86px;
      height: 86px;
      object-fit: contain;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -1px;
    }
    h1 span { color: #2563eb; }
    p {
      margin: 10px auto 24px;
      max-width: 310px;
      font-size: 13px;
      line-height: 1.65;
      color: #64748b;
    }
    .google-btn {
      width: 100%;
      height: 52px;
      border: 1px solid #dbe7f7;
      border-radius: 16px;
      background: #fff;
      color: #0f172a;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(37,99,235,.08);
    }
    .google-mark {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #2563eb;
      background: #eff6ff;
    }
    .status {
      margin-top: 14px;
      min-height: 18px;
      font-size: 12px;
      color: #64748b;
    }
    .demo-link {
      margin-top: 12px;
      display: inline-block;
      font-size: 12px;
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
    }
  
    .login-form {
      width: 100%;
      display: grid;
      gap: 8px;
      margin-top: 14px;
      text-align: left;
    }

    .field-label {
      font-size: 11px;
      font-weight: 600;
      color: #334155;
      margin-left: 2px;
    }

    .login-input {
      width: 100%;
      height: 44px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 14px;
      background: #ffffff;
      padding: 0 14px;
      font: inherit;
      font-size: 13px;
      color: #0f172a;
      outline: none;
      box-sizing: border-box;
    }

    .login-input:focus {
      border-color: rgba(37, 99, 235, 0.65);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
    }

    .login-links {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 2px 2px 4px;
      font-size: 12px;
      font-weight: 600;
    }

    .login-links a,
    .demo-link {
      color: #2563eb;
      text-decoration: none;
    }

    .login-submit {
      width: 100%;
      height: 44px;
      border: 0;
      border-radius: 14px;
      background: #2563eb;
      color: #ffffff;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .login-divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0 10px;
      color: #94a3b8;
      font-size: 11px;
      font-weight: 600;
    }

    .login-divider::before,
    .login-divider::after {
      content: "";
      height: 1px;
      flex: 1;
      background: rgba(148, 163, 184, 0.28);
    }

  
    /* SMARTWORK_LOGIN_GOOGLE_ICON_WEIGHT_PHASE5ZV_N2 */
    .google-btn {
      font-weight: 500 !important;
      letter-spacing: -0.01em;
    }

    .google-btn .google-mark.google-icon {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: #f8fafc;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .google-btn .google-mark.google-icon svg {
      display: block;
    }

  
    /* SMARTWORK_LOGIN_GOOGLE_FINAL_WEIGHT_ICON_PHASE5ZV_N3 */
    #googleLoginBtn {
      font-weight: 400 !important;
      gap: 10px !important;
    }

    #googleLoginBtn .google-text {
      font-weight: 400 !important;
      font-size: 13px;
      color: #0f172a;
      line-height: 1;
    }

    #googleLoginBtn .google-mark.google-icon {
      width: 24px !important;
      height: 24px !important;
      min-width: 24px !important;
      background: #ffffff !important;
      border-radius: 999px !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    #googleLoginBtn .google-mark.google-icon svg {
      width: 16px !important;
      height: 16px !important;
      display: block !important;
    }

  
    /* SMARTWORK_LOGIN_GOOGLE_TEXT_FORCE_PHASE5ZV_N4 */
    #googleLoginBtn,
    #googleLoginBtn .google-text {
      font-weight: 400 !important;
      font-size: 13px !important;
    }

    #googleLoginBtn .google-mark,
    #googleLoginBtn .google-mark * {
      font-weight: 400 !important;
    }

    /* LOGIN_BRAND_TITLE_PHASE5ZV_N7 */
    .login-brand-title {
      margin: 8px 0 6px !important;
      font-size: 24px !important;
      line-height: 1.1 !important;
      font-weight: 700 !important;
      letter-spacing: -0.04em !important;
      color: #0f172a !important;
    }
    .login-brand-title .brand-dark {
      color: #0f172a !important;
    }
    .login-brand-title .brand-blue {
      color: #2563eb !important;
    }
    .login-brand-subtitle {
      margin: 0 0 18px !important;
      font-size: 12px !important;
      line-height: 1.45 !important;
      color: #475569 !important;
      font-weight: 400 !important;
    }
  
    /* LOGIN_TERMS_PHASE5ZV_N8 */
    .login-terms {
      margin: 18px 0 0 !important;
      font-size: 10.5px !important;
      line-height: 1.55 !important;
      color: #64748b !important;
      text-align: center !important;
      font-weight: 400 !important;
    }
    .login-terms a {
      color: #2563eb !important;
      text-decoration: none !important;
      font-weight: 500 !important;
    }
  
    /* LOGIN_HIDE_STATUS_PREVIEW_PHASE5ZV_N9 */
    .login-hidden {
      display: none !important;
    }
  </style>

  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#2563eb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="SmartWork">
  <link rel="apple-touch-icon" href="/icons/smartwork-icon-192.svg">

</head>
<body>
  <main class="phone">
    <section class="card">
      <img class="logo" src="/smartwork-logo.png" alt="SmartWork Agent">
      <h1 class="login-brand-title"><span class="brand-dark">smart</span><span class="brand-blue">work-agent</span></h1>
      <p class="login-brand-subtitle">Kerja lebih smart, hasil lebih maksimal.</p>

      
      <form class="login-form" id="localLoginForm" autocomplete="on">
        <label class="field-label" for="loginUsername">Username</label>
        <input class="login-input" id="loginUsername" name="username" type="text" placeholder="Masukkan username" autocomplete="username">

        <label class="field-label" for="loginPassword">Password</label>
        <input class="login-input" id="loginPassword" name="password" type="password" placeholder="Masukkan password" autocomplete="current-password">

        <div class="login-links">
          <a href="#" id="forgotPasswordLink">Lupa password?</a>
          <a href="#" id="registerLink">Registrasi</a>
        </div>

        <button class="login-submit" id="localLoginBtn" type="button">Masuk</button>
      </form>

      <div class="login-divider"><span>atau</span></div>

      <button class="google-btn" id="googleLoginBtn" type="button">
        <span class="google-mark google-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="16" height="16" focusable="false">
            <path fill="#4285F4" d="M21.6 12.2c0-.7-.1-1.3-.2-1.9H12v3.6h5.4c-.2 1.2-.9 2.2-1.9 2.9v2.4h3.1c1.8-1.7 3-4.1 3-7z"/>
            <path fill="#34A853" d="M12 22c2.7 0 5-0.9 6.6-2.4l-3.1-2.4c-.9.6-2 .9-3.5.9-2.7 0-4.9-1.8-5.7-4.2H3.1v2.5C4.7 19.7 8.1 22 12 22z"/>
            <path fill="#FBBC05" d="M6.3 13.9c-.2-.6-.3-1.2-.3-1.9s.1-1.3.3-1.9V7.6H3.1C2.4 8.9 2 10.4 2 12s.4 3.1 1.1 4.4l3.2-2.5z"/>
            <path fill="#EA4335" d="M12 5.9c1.5 0 2.8.5 3.8 1.5l2.8-2.8C16.9 3 14.7 2 12 2 8.1 2 4.7 4.3 3.1 7.6l3.2 2.5C7.1 7.7 9.3 5.9 12 5.9z"/>
          </svg>
        </span>
        <span class="google-text">Masuk dengan Google</span>
      </button>

      <div class="status login-hidden" id="loginStatus" aria-live="polite"></div>
      <a class="demo-link login-hidden" href="/home.html" aria-hidden="true" tabindex="-1">Masuk mode preview</a>
      <p class="login-terms">
        Dengan login, Anda menyetujui<br>
        <a href="/terms.html">Syarat & Ketentuan</a> dan <a href="/privacy.html">Kebijakan Privasi</a>
      </p>
    </section>
  </main>

  <script src="/firebase-config.local.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const statusEl = document.getElementById("loginStatus");
    const btn = document.getElementById("googleLoginBtn");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    btn.addEventListener("click", async () => {
      try {
        if (!window.SMARTWORK_FIREBASE_CONFIG) {
          setStatus("Firebase config belum ditemukan.");
          return;
        }

        setStatus("Membuka login Google...");
        const app = initializeApp(window.SMARTWORK_FIREBASE_CONFIG);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const result = await signInWithPopup(auth, provider);
        localStorage.setItem("smartwork_user", JSON.stringify({
          name: result.user.displayName || "",
          email: result.user.email || "",
          photoURL: result.user.photoURL || ""
        }));

        window.location.href = "/home.html";
      } catch (error) {
        console.error(error);
        setStatus("Login gagal. Cek Firebase Authorized domain / API key.");
      }
    });
  </script>

<script id="smartwork-pwa-register-v5ze">
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js").catch((err) => {
        console.warn("[SmartWork PWA] service worker registration failed", err);
      });
    });
  }
</script>

</body>
</html>
