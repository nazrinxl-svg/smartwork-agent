<!doctype html>
<html lang="id">
<head>

  <title>Login - SmartWork Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      background: #eaf1fb;
      color: #061a40;
      display: flex;
      justify-content: center;
    }
    .phone {
      width: 430px;
      max-width: 100%;
      min-height: 100vh;
      padding: 42px 22px;
      background: linear-gradient(180deg, #f8fbff 0%, #edf5ff 100%);
      display: flex;
      align-items: center;
    }
    .card {
      width: 100%;
      background: #fff;
      border: 1px solid #dbe7f7;
      border-radius: 28px;
      padding: 28px 22px;
      box-shadow: 0 24px 70px rgba(15, 47, 96, .12);
      text-align: center;
    }
    .logo {
      width: 86px;
      height: 86px;
      object-fit: contain;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -1px;
    }
    h1 span { color: #2563eb; }
    p {
      margin: 10px auto 24px;
      max-width: 310px;
      font-size: 13px;
      line-height: 1.65;
      color: #64748b;
    }
    .google-btn {
      width: 100%;
      height: 52px;
      border: 1px solid #dbe7f7;
      border-radius: 16px;
      background: #fff;
      color: #0f172a;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(37,99,235,.08);
    }
    .google-mark {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #2563eb;
      background: #eff6ff;
    }
    .status {
      margin-top: 14px;
      min-height: 18px;
      font-size: 12px;
      color: #64748b;
    }
    .demo-link {
      margin-top: 12px;
      display: inline-block;
      font-size: 12px;
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
    }
  
    .login-form {
      width: 100%;
      display: grid;
      gap: 8px;
      margin-top: 14px;
      text-align: left;
    }

    .field-label {
      font-size: 11px;
      font-weight: 600;
      color: #334155;
      margin-left: 2px;

      width: 100%;
      height: 44px;

    .login-input:focus {

    .login-links {

      justify-content: space-between;

    .login-submit {

      border: 0;

    .login-divider {

      align-items: center;

      margin: 12px 0 10px;

      font-size: 11px;
      font-weight: 600;
    }

    .login-divider::before,
    .login-divider::after {
      content: "";
      height: 1px;
      flex: 1;
      background: rgba(148, 163, 184, 0.28);
    }

  
    /* SMARTWORK_LOGIN_GOOGLE_ICON_WEIGHT_PHASE5ZV_N2 */
    .google-btn {
      font-weight: 500 !important;
      letter-spacing: -0.01em;
    }

    .google-btn .google-mark.google-icon {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: #f8fafc;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .google-btn .google-mark.google-icon svg {
      display: block;
    }

  
    /* SMARTWORK_LOGIN_GOOGLE_FINAL_WEIGHT_ICON_PHASE5ZV_N3 */
    #googleLoginBtn {
      font-weight: 400 !important;
      gap: 10px !important;
    }

    #googleLoginBtn .google-text {
      font-weight: 400 !important;
      font-size: 13px;
      color: #0f172a;
      line-height: 1;
    }

    #googleLoginBtn .google-mark.google-icon {
      width: 24px !important;
      height: 24px !important;
      min-width: 24px !important;
      background: #ffffff !important;
      border-radius: 999px !important;
      display: inline-flex !important;
      align-items: center !important;
      justify-content: center !important;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    #googleLoginBtn .google-mark.google-icon svg {
      width: 16px !important;
      height: 16px !important;
      display: block !important;
    }

  
    /* SMARTWORK_LOGIN_GOOGLE_TEXT_FORCE_PHASE5ZV_N4 */
    #googleLoginBtn,
    #googleLoginBtn .google-text {
      font-weight: 400 !important;
      font-size: 13px !important;
    }

    #googleLoginBtn .google-mark,

    /* LOGIN_BRAND_TITLE_PHASE5ZV_N7 */

      font-weight: 700 !important;
      letter-spacing: -0.04em !important;
      color: #0f172a !important;
    }
    .login-brand-title .brand-dark {
      color: #0f172a !important;
    }
    .login-brand-title .brand-blue {
      color: #2563eb !important;
    }
    .login-brand-subtitle {
      margin: 0 0 18px !important;
      font-size: 12px !important;
      line-height: 1.45 !important;
      color: #475569 !important;
      font-weight: 400 !important;
    }
  
    /* LOGIN_TERMS_PHASE5ZV_N8 */
    .login-terms {
      margin: 18px 0 0 !important;
      font-size: 10.5px !important;
      line-height: 1.55 !important;
      color: #64748b !important;
      text-align: center !important;
      font-weight: 400 !important;
    }
    .login-terms a {
      color: #2563eb !important;
      text-decoration: none !important;
      font-weight: 500 !important;
    }
  
    /* LOGIN_HIDE_STATUS_PREVIEW_PHASE5ZV_N9 */
    .login-hidden {
      display: none !important;
    }

<style id="smartwork-login-register-reset-ux-phase5zw-c1-style">

<script type="module" id="smartwork-login-register-reset-ux-phase5zw-c1-script">
  import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    sendPasswordResetEmail,
    updateProfile
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

  const qs = (id) => document.getElementById(id);

  const localLoginForm = qs("localLoginForm");
  const localLoginBtn = qs("localLoginBtn");
  const usernameInput = qs("loginUsername");
  const passwordInput = qs("loginPassword");
  const forgotLink = qs("forgotPasswordLink");
  const registerLink = qs("registerLink");
  const statusEl = qs("loginStatus");

  const modal = qs("authModalBackdrop");
  const modalTitle = qs("authModalTitle");
  const modalText = qs("authModalText");
  const modalNote = qs("authModalNote");
  const closeBtn = qs("authModalClose");
  const registerForm = qs("registerForm");
  const resetForm = qs("resetForm");
  const registerSubmit = qs("registerSubmit");
  const resetSubmit = qs("resetSubmit");

  function setLoginStatus(message, type = "") {
    if (!statusEl) return;
    statusEl.textContent = message || "";
    statusEl.classList.remove("login-hidden");
    statusEl.dataset.type = type;
  }

  function setNote(message, type = "") {
    if (!modalNote) return;
    modalNote.textContent = message || "";
    modalNote.className = "auth-modal-note" + (type ? " " + type : "");
  }

  function getAuthSafe() {
    if (!window.SMARTWORK_FIREBASE_CONFIG) {
      throw new Error("Firebase config belum tersedia.");
    }
    const app = getApps().length
      ? getApps()[0]
      : initializeApp(window.SMARTWORK_FIREBASE_CONFIG);
    return getAuth(app);
  }

  function rememberUser(user) {
    const payload = {
      uid: user.uid,
      email: user.email || "",
      displayName: user.displayName || user.email || "SmartWork User",
      photoURL: user.photoURL || "",
      loginProvider: "password",
      loggedInAt: new Date().toISOString()
    };
    localStorage.setItem("smartwork_user", JSON.stringify(payload));
  }

  function openModal(mode) {
    if (!modal) return;
    setNote("");
    modal.classList.add("show");
    modal.setAttribute("aria-hidden", "false");

    if (mode === "reset") {
      modalTitle.textContent = "Reset password";
      modalText.textContent = "Masukkan email akun. Link reset akan dikirim melalui email.";
      registerForm.style.display = "none";
      resetForm.style.display = "grid";
      qs("resetEmail")?.focus();
      const current = usernameInput?.value?.trim();
      if (current && current.includes("@")) qs("resetEmail").value = current;
      return;
    }

    modalTitle.textContent = "Registrasi";
    modalText.textContent = "Buat akun SmartWork Agent dengan email dan password.";
    resetForm.style.display = "none";
    registerForm.style.display = "grid";
    qs("registerName")?.focus();
    const current = usernameInput?.value?.trim();
    if (current && current.includes("@")) qs("registerEmail").value = current;
  }

  function closeModal() {
    if (!modal) return;
    modal.classList.remove("show");
    modal.setAttribute("aria-hidden", "true");
    setNote("");
  }

  forgotLink?.addEventListener("click", (event) => {
    event.preventDefault();
    openModal("reset");
  });

  registerLink?.addEventListener("click", (event) => {
    event.preventDefault();
    openModal("register");
  });

  closeBtn?.addEventListener("click", closeModal);

  modal?.addEventListener("click", (event) => {
    if (event.target === modal) closeModal();
  });

  window.addEventListener("keydown", (event) => {
    if (event.key === "Escape") closeModal();
  });

  localLoginBtn?.addEventListener("click", async () => {
    const email = usernameInput?.value?.trim() || "";
    const password = passwordInput?.value || "";

    if (!email || !password) {
      setLoginStatus("Isi email dan password dulu.", "err");
      return;
    }

    if (!email.includes("@")) {
      setLoginStatus("Untuk login akun aplikasi, gunakan email.", "err");
      return;
    }

    try {
      localLoginBtn.disabled = true;
      setLoginStatus("Masuk ke SmartWork...", "");
      const auth = getAuthSafe();
      const result = await signInWithEmailAndPassword(auth, email, password);
      rememberUser(result.user);
      setLoginStatus("Login berhasil. Membuka dashboard...", "ok");
      window.location.href = "/home.html";
    } catch (error) {
      console.error("[SmartWork Auth] login failed", error);
      setLoginStatus("Login gagal. Cek email/password atau aktifkan Email/Password di Firebase.", "err");
    } finally {
      localLoginBtn.disabled = false;
    }
  });

  localLoginForm?.addEventListener("submit", (event) => {
    event.preventDefault();
    localLoginBtn?.click();
  });

  registerForm?.addEventListener("submit", async (event) => {
    event.preventDefault();

    const name = qs("registerName")?.value?.trim() || "";
    const email = qs("registerEmail")?.value?.trim() || "";
    const password = qs("registerPassword")?.value || "";

    if (!name || !email || !password) {
      setNote("Nama, email, dan password wajib diisi.", "err");
      return;
    }

    if (password.length < 6) {
      setNote("Password minimal 6 karakter.", "err");
      return;
    }

    try {
      registerSubmit.disabled = true;
      setNote("Mendaftarkan akun...", "");
      const auth = getAuthSafe();
      const result = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(result.user, { displayName: name });
      rememberUser({ ...result.user, displayName: name });
      setNote("Registrasi berhasil. Membuka dashboard...", "ok");
      setTimeout(() => {
        window.location.href = "/home.html";
      }, 500);
    } catch (error) {
      console.error("[SmartWork Auth] register failed", error);
      setNote("Registrasi gagal. Pastikan Email/Password aktif di Firebase dan email belum dipakai.", "err");
    } finally {
      registerSubmit.disabled = false;
    }
  });

  resetForm?.addEventListener("submit", async (event) => {
    event.preventDefault();

    const email = qs("resetEmail")?.value?.trim() || "";
    if (!email) {
      setNote("Masukkan email akun dulu.", "err");
      return;
    }

    try {
      resetSubmit.disabled = true;
      setNote("Mengirim link reset password...", "");
      const auth = getAuthSafe();
      await sendPasswordResetEmail(auth, email, {
        url: window.location.origin + "/index.html?reset=done&email=" + encodeURIComponent(email),
        handleCodeInApp: false
      });
      setNote("Permintaan reset diterima. Cek inbox/spam email.", "ok");

      setTimeout(() => {
        closeModal();

        if (usernameInput) usernameInput.value = email;

        setLoginStatus(
          "Link reset password sudah diminta. Setelah password diganti, login dengan password baru.",
          "ok"
        );
      }, 900);
    } catch (error) {
      console.error("[SmartWork Auth] reset failed", error);
      setNote("Gagal mengirim reset. Cek email atau aktifkan Email/Password di Firebase.", "err");
    } finally {
      resetSubmit.disabled = false;
    }
  });
</script>
<!-- smartwork-login-register-reset-ux-phase5zw-c1_END -->

  <script src="/firebase-config.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const statusEl = document.getElementById("loginStatus");
    const btn = document.getElementById("googleLoginBtn");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    btn.addEventListener("click", async () => {
      try {
        if (!window.SMARTWORK_FIREBASE_CONFIG) {
          setStatus("Firebase config belum ditemukan.");
          return;
        }

        setStatus("Membuka login Google...");
        const app = initializeApp(window.SMARTWORK_FIREBASE_CONFIG);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const result = await signInWithPopup(auth, provider);
        localStorage.setItem("smartwork_user", JSON.stringify({
          name: result.user.displayName || "",
          email: result.user.email || "",
          photoURL: result.user.photoURL || ""
        }));

        window.location.href = "/home.html";
      } catch (error) {
        console.error(error);
        setStatus("Login gagal. Cek Firebase Authorized domain / API key.");
      }
    });
  </script>

<script id="smartwork-pwa-register-v5ze">
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js").catch((err) => {
        console.warn("[SmartWork PWA] service worker registration failed", err);
      });
    });
  }

  /* smartwork-reset-return-login-phase5zw-c2 */
  (() => {
    const params = new URLSearchParams(window.location.search);
    if (params.get("reset") !== "done") return;

    const email = params.get("email") || "";
    const input = document.getElementById("loginUsername");
    const status = document.getElementById("loginStatus");

    if (input && email) input.value = email;

    if (status) {
      status.textContent = "Password berhasil diubah. Silakan login dengan password baru.";
