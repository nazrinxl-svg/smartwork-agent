<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - SmartWork Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      background: #eaf1fb;
      color: #061a40;
      display: flex;
      justify-content: center;
    }
    .phone {
      width: 430px;
      max-width: 100%;
      min-height: 100vh;
      padding: 42px 22px;
      background: linear-gradient(180deg, #f8fbff 0%, #edf5ff 100%);
      display: flex;
      align-items: center;
    }
    .card {
      width: 100%;
      background: #fff;
      border: 1px solid #dbe7f7;
      border-radius: 28px;
      padding: 28px 22px;
      box-shadow: 0 24px 70px rgba(15, 47, 96, .12);
      text-align: center;
    }
    .logo {
      width: 86px;
      height: 86px;
      object-fit: contain;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -1px;
    }
    h1 span { color: #2563eb; }
    p {
      margin: 10px auto 24px;
      max-width: 310px;
      font-size: 13px;
      line-height: 1.65;
      color: #64748b;
    }
    .google-btn {
      width: 100%;
      height: 52px;
      border: 1px solid #dbe7f7;
      border-radius: 16px;
      background: #fff;
      color: #0f172a;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(37,99,235,.08);
    }
    .google-mark {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #2563eb;
      background: #eff6ff;
    }
    .status {
      margin-top: 14px;
      min-height: 18px;
      font-size: 12px;
      color: #64748b;
    }
    .demo-link {
      margin-top: 12px;
      display: inline-block;
      font-size: 12px;
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="phone">
    <section class="card">
      <img class="logo" src="/smartwork-logo.png" alt="SmartWork Agent">
      <h1>Smart<span>Work</span></h1>
      <p>Masuk dengan akun Google untuk membuat request kerja agent, melihat riwayat, laporan bukti, dan pengiriman PDF.</p>

      <button class="google-btn" id="googleLoginBtn" type="button">
        <span class="google-mark">G</span>
        Login dengan Google
      </button>

      <div class="status" id="loginStatus">Siap login.</div>
      <a class="demo-link" href="/home.html">Masuk mode preview</a>
    </section>
  </main>

  <script src="/firebase-config.local.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const statusEl = document.getElementById("loginStatus");
    const btn = document.getElementById("googleLoginBtn");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    btn.addEventListener("click", async () => {
      try {
        if (!window.SMARTWORK_FIREBASE_CONFIG) {
          setStatus("Firebase config belum ditemukan.");
          return;
        }

        setStatus("Membuka login Google...");
        const app = initializeApp(window.SMARTWORK_FIREBASE_CONFIG);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const result = await signInWithPopup(auth, provider);
        localStorage.setItem("smartwork_user", JSON.stringify({
          name: result.user.displayName || "",
          email: result.user.email || "",
          photoURL: result.user.photoURL || ""
        }));

        window.location.href = "/home.html";
      } catch (error) {
        console.error(error);
        setStatus("Login gagal. Cek Firebase Authorized domain / API key.");
      }
    });
  </script>
</body>
</html>
