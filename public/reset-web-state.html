<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>Reset SmartWork State</title>

  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#2563eb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="SmartWork">
  <link rel="apple-touch-icon" href="/icons/smartwork-icon-192.svg">

</head>
<body>
<script>
const keys = [];
for (let i = 0; i < localStorage.length; i++) {
  const key = localStorage.key(i);
  if (key && key.toLowerCase().includes("smartwork")) keys.push(key);
}
[
  "smartwork_request",
  "smartwork_request_server",
  "smartwork_progress",
  "smartwork_history",
  "smartwork_active_request",
  "smartwork_last_job",
  "smartwork_latest_job",
  "smartwork_result",
  "smartwork_app_artifacts",
  "smartwork_proof",
  "smartwork_pdf",
  "smartwork_siaga_job"
].forEach((key) => keys.push(key));

[...new Set(keys)].forEach((key) => localStorage.removeItem(key));

sessionStorage.clear();

document.body.innerHTML = "<h3>SmartWork state kosong.</h3><p>Membuka Progress...</p>";
setTimeout(() => location.href = "/progress.html?empty=" + Date.now(), 500);
</script>

<script id="smartwork-pwa-register-v5ze">
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js").catch((err) => {
        console.warn("[SmartWork PWA] service worker registration failed", err);
      });
    });
  }
</script>

</body>
</html>
