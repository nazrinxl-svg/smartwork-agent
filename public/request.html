<body>
  <main class="app">
        <section class="hero request-heading">
      <div class="heading-brand">
        <div class="logo"><img src="/smartwork-logo.png" alt="SmartWork"></div>
        <div>
          <h1>Smart<span style="color:#2563eb">Work</span></h1>
          <p class="subtitle">Request</p>
        </div>
      </div>

      <a class="heading-profile" href="/profile.html" aria-label="Profil">
        <img id="requestProfilePhoto" src="/smartwork-logo.png" alt="Profil">
        <i></i>
      </a>
    </section>

    <section class="card">
      <div class="card-head">
        <div>
          <h2 class="card-title">Form Request User</h2>
          <p class="subtitle">Data ini dibaca agent sebelum menjalankan pekerjaan.</p>
        </div>
        <div class="badge">SIAGA</div>
      </div>

      <form id="requestForm">
        <div class="section-title">Data Pemohon</div>

        <div class="field">
          <label>Nama</label>
          <input name="requesterName" placeholder="Nama pemohon" required />
        </div>

        <div class="grid-2">
          <div class="field">
            <label>Email</label>
            <input name="email" type="email" placeholder="email@contoh.com" />
          </div>

          <div class="field">
            <label>WhatsApp</label>
            <input name="whatsapp" placeholder="Nomor WhatsApp" />
          </div>
        </div>

        <div class="field">
          <label>Username</label>
          <input name="username" placeholder="Masukkan username SIAGA" />
        </div>

        <div class="field">
          <label>Password</label>
          <input name="password" type="password" placeholder="Masukkan password SIAGA" />
        </div>


        <div class="field">
          <label>Dari Tanggal - Ke Tanggal</label>
          <div class="grid-2">
            <div class="date-wrap"><input name="startDate" type="date" /></div>
            <div class="date-wrap"><input name="endDate" type="date" /></div>
          </div>
        </div>

        <div class="field">
          <label>Hari Libur / Cuti</label>
          <input name="holidays" placeholder="Contoh: 3, 4, 5, 10" />
        </div>

        <label class="check">
          <input name="dailyReport" type="checkbox" checked />
          <span>Buat laporan harian/progress setelah agent bekerja.</span>
        </label>

        <div class="field">
          <label>Catatan</label>
          <textarea name="notes" placeholder="Catatan tambahan untuk agent"></textarea>
        </div>

        <button type="submit">Simpan Request</button>
      </form>

      <div id="savedBox" class="saved">Belum ada request disimpan.</div>
    </section>
  </main>

  <script>
    const form = document.getElementById("requestForm");
    const savedBox = document.getElementById("savedBox");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const data = Object.fromEntries(new FormData(form).entries());
      data.dailyReport = form.dailyReport.checked;
      localStorage.setItem("smartwork_request", JSON.stringify(data, null, 2));

      const start = data.startDate ? new Date(data.startDate) : new Date();
      const monthNames = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
      const holidayDays = String(data.holidays || "")
        .split(",")
        .map((item) => item.trim())
        .filter(Boolean)
        .map((day) => String(Number(day)).padStart(2, "0"));

      const payload = {
        jobId: "smartwork-siaga-" + new Date().toISOString().replace(/[:.]/g, "-"),
        requesterName: data.requesterName || "",
        targetMonth: monthNames[start.getMonth()],
        targetYear: String(start.getFullYear()),
        requestType: "bulk-monthly",
        detailUrl: "https://siagapendis.kemenag.go.id/guru/absensi/detail/8860825",
        schedule: {
          holidayDates: holidayDays,
          globalSkipDates: []
        },
        accounts: [{
          teacherId: "guru-001",
          teacherName: data.requesterName || "Nazrin",
          schoolName: "SDN 4 DWI TUNGGAL",
          schoolId: "16870",
          detailUrl: "https://siagapendis.kemenag.go.id/guru/absensi/detail/8860825",
          targetDetailUrl: "https://siagapendis.kemenag.go.id/guru/absensi/detail/8860825",
          username: data.username || "",
          password: data.password || "",
          startDate: data.startDate || "",
          endDate: data.endDate || ""
        }],
        delivery: {
          email: data.email || "",
          whatsapp: data.whatsapp || ""
        },
        dailyReport: Boolean(data.dailyReport),
        notes: data.notes || ""
      };

      savedBox.textContent = "Menyimpan request ke server...";

      try {
        const res = await fetch("/api/requests", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const result = await res.json();

        if (!res.ok || !result.ok) {
          throw new Error((result.errors || [result.error || "Request gagal disimpan."]).join(" "));
        }

        localStorage.setItem("smartwork_request_server", JSON.stringify(result, null, 2));
        savedBox.textContent = "Request tersimpan di server. Job: " + result.jobId;
      } catch (err) {
        savedBox.textContent = "Request tersimpan lokal, tapi gagal kirim server: " + err.message;
      }
    });
  </script>
