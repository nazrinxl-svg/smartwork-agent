      height: 28px;

<script id="smartwork-request-reset-progress-on-submit-v1">
/* SMARTWORK_REQUEST_RESET_PROGRESS_ON_SUBMIT_V1
   User-submit only: reset progress UI to 0/queued when a new request is submitted from the app.
   No SIAGA action. No terminal-created request. */
(() => {
  function pickValue(selectors) {
    for (const selector of selectors) {
      const el = document.querySelector(selector);
      if (el && "value" in el && String(el.value || "").trim()) return String(el.value || "").trim();
    }
    return "";
  }

  function getRequestSnapshot() {
    const startDate = pickValue([
      "[name='startDate']",
      "[name='fromDate']",
      "[name='tanggalMulai']",
      "#startDate",
      "#fromDate",
      "#tanggalMulai"
    ]);

    const endDate = pickValue([
      "[name='endDate']",
      "[name='toDate']",
      "[name='tanggalSelesai']",
      "#endDate",
      "#toDate",
      "#tanggalSelesai"
    ]);

    const teacherName = pickValue([
      "[name='teacherName']",
      "[name='nama']",
      "#teacherName",
      "#nama"
    ]) || "Nazrin";

    return {
      source: "smartwork-user-request-form",
      trigger: "UI_SUBMIT",
      submittedAt: new Date().toISOString(),
      teacherName,
      startDate,
      endDate,
      requestRange: [startDate, endDate].filter(Boolean).join("..")
    };
  }

  function resetProgressFromUiSubmit() {
    const request = getRequestSnapshot();

    const state = {
      ok: true,
      mode: "SMARTWORK_PROGRESS_LIVE_STATE",
      source: "UI_SUBMIT_RESET",
      generatedAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
      request,
      percent: 0,
      stage: "Request baru diterima",
      status: "queued",
      currentStep: "request-submitted",
      message: "Request baru sudah dikirim dari aplikasi. Sistem mulai memproses dari 0%.",
      artifacts: {
        pdfReady: false,
        proofReady: false,
        uiTitle: null
      }
    };

    localStorage.setItem("smartwork_progress_live_state", JSON.stringify(state));
    localStorage.setItem("smartwork_progress_reset_at", state.updatedAt);
    localStorage.setItem("smartwork_progress_active_range", request.requestRange || "");
  }

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (!form || !String(form.outerHTML || "").toLowerCase().includes("siaga")) return;
    resetProgressFromUiSubmit();
  }, true);

  document.addEventListener("click", (event) => {
    const btn = event.target?.closest?.("button,a");
    if (!btn) return;

    const text = String(btn.textContent || "").toLowerCase();
    const isSubmit =
      text.includes("simpan") ||
      text.includes("request") ||
      text.includes("kirim") ||
      btn.type === "submit";

    if (!isSubmit) return;
    resetProgressFromUiSubmit();
  }, true);

  window.SmartWorkRequestResetProgressOnSubmit = { reset: resetProgressFromUiSubmit };
})();
</script>


<script id="smartwork-request-production-queue-bridge-v1">
/* SMARTWORK_REQUEST_PRODUCTION_QUEUE_BRIDGE_V1
   User submit bridge only.
   Keeps legacy /api/requests flow.
   Also creates dry-run production job via /api/smartwork/jobs.
   Does not send raw SIAGA credential secret to production queue.
   No SIAGA action. No browser open. No real save. */
(function () {
  const form = document.getElementById("requestForm");
  if (!form || form.__smartworkProductionQueueBridgeInstalled) return;

  form.__smartworkProductionQueueBridgeInstalled = true;

  function readFormSnapshot() {
    const fd = new FormData(form);
    const data = Object.fromEntries(fd.entries());

    const startDate =
      data.startDate ||
      data.fromDate ||
      data.dariTanggal ||
      data.tanggalMulai ||
      "";

    const endDate =
      data.endDate ||
      data.toDate ||
      data.sampaiTanggal ||
      data.tanggalSelesai ||
      "";

    const requesterName =
      data.requesterName ||
      data.teacherName ||
      data.nama ||
      "Nazrin";

    const requesterEmail =
      data.email ||
      data.requesterEmail ||
      "";

    const requesterWhatsapp =
      data.whatsapp ||
      data.wa ||
      data.requesterWhatsapp ||
      "";

    const username =
      data.username ||
      data.siagaUsername ||
      data.accountUsername ||
      "";

    return {
      source: "smartwork-request-html-production-bridge",
      module: "siaga",
      agent: "siaga",
      requestType: data.requestType || "bulk-monthly",
      requesterName,
      teacherName: requesterName,
      email: requesterEmail,
      requesterEmail,
      whatsapp: requesterWhatsapp,
      requesterWhatsapp,
      accountRef: username || "guru-001",
      credentialRef: username || "guru-001",
      requestRange: {
        startDate,
        endDate
      },
      startDate,
      endDate,
      notes: data.notes || data.note || data.catatan || "",
      delivery: {
        mode: "app_download_only"
      },
      safety: {
        dryRun: true,
        noRealSave: true,
        noRealSend: true,
        noSiagaInput: true,
        noBrowserOpen: true,
        rawPasswordStored: false
      }
    };
  }

  function resetProductionQueueLocalState(jobResult) {
    try {
      const state = {
        mode: "SMARTWORK_PROGRESS_LIVE_STATE",
        source: "smartwork-request-production-queue-bridge",
        updatedAt: new Date().toISOString(),
        jobId: jobResult?.jobId || jobResult?.job?.id || null,
        status: "QUEUED",
        percent: 0,
        stage: "Request masuk production queue",
        currentStep: "production-job-queued",
        message: "Request sudah masuk production queue dry-run. Worker akan memproses tanpa real save.",
        artifacts: {
          pdfReady: false,
          proofReady: false
        }
      };

      localStorage.setItem("smartwork_production_job", JSON.stringify(jobResult || {}, null, 2));
      localStorage.setItem("smartwork_progress_live_state", JSON.stringify(state));
    } catch {}
  }

  const SMARTWORK_DISABLE_SAME_ORIGIN_QUEUE_BRIDGE =
    ["smartwork-agent-orcin.vercel.app", "smartwork-agent.id", "api.smartwork-agent.id"].includes(window.location.hostname);

  if (SMARTWORK_DISABLE_SAME_ORIGIN_QUEUE_BRIDGE) {
    window.SmartWorkProductionQueueBridge = {
      readFormSnapshot,
      submit: async function () {
        return {
          ok: true,
          skipped: true,
          reason: "same_origin_queue_bridge_disabled_public_api_active"
        };
      }
    };
    return;
  }

  async function submitProductionJobBridge() {
    const payload = readFormSnapshot();

    if (!payload.requestRange.startDate || !payload.requestRange.endDate) {
      return {
        ok: false,
        skipped: true,
        reason: "missing_request_range"
      };
    }

    const res = await fetch("/api/smartwork/jobs", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const result = await res.json().catch(() => ({
      ok: false,
      error: "invalid_json_response"
    }));

    if (!res.ok || result.ok === false) {
      throw new Error((result.validation?.errors || [result.error || "Production queue gagal."]).join(" "));
    }

    resetProductionQueueLocalState(result);

    return result;
  }

  form.addEventListener("submit", function () {
    window.setTimeout(function () {
      submitProductionJobBridge()
        .then(function (result) {
          try {
            const savedBox = document.getElementById("savedBox");
            if (savedBox && result?.jobId) {
              savedBox.textContent = "Request tersimpan. Production Job: " + result.jobId;
            }
          } catch {}
        })
        .catch(function (error) {
          try {
            localStorage.setItem("smartwork_production_job_error", String(error?.message || error));
          } catch {}

          const savedBox = document.getElementById("savedBox");
          if (savedBox) {
            savedBox.textContent = "Request tersimpan, tapi production queue belum masuk: " + (error?.message || error);
          }
        });
    }, 250);
  });

  window.SmartWorkProductionQueueBridge = {
    readFormSnapshot,
    submit: submitProductionJobBridge
  };
})();
</script>

<script id="smartwork-phase5v-vps-api-bridge">
(() => {
  const PHASE = "5V";
  const SMARTWORK_PUBLIC_API_BASE = "https://api.smartwork-agent.id";
  const SMARTWORK_LEGACY_API_BASES = new Set([
    "http://103.152.242.193:3107",
    "http://127.0.0.1:3107",
    "http://localhost:3107"
  ]);

  const DEFAULT_API_BASE = (() => {
    const { hostname, port, origin } = window.location;
    if ((hostname === "103.152.242.193" && port === "3108") || hostname === "smartwork-agent.id" || hostname === "api.smartwork-agent.id") {
      return origin;
    }
    return SMARTWORK_PUBLIC_API_BASE;
  })();

  const savedApiBase = String(localStorage.getItem("smartwork_vps_api_base") || "").replace(/\/+$/, "");
  const API_BASE = (!savedApiBase || SMARTWORK_LEGACY_API_BASES.has(savedApiBase)) ? DEFAULT_API_BASE : savedApiBase;
  localStorage.setItem("smartwork_vps_api_base", API_BASE);

  const HEALTH_PATH = "/api/smartwork/jobs/health";
  const SUBMIT_PATHS = ["/api/smartwork/jobs"];

  function status(message, ok = true) {
    console.log("[SmartWork Phase 5V]", message);
    let el = document.getElementById("smartwork-phase5v-vps-status");
    if (!el) {
      el = document.createElement("div");
      el.id = "smartwork-phase5v-vps-status";
      el.style.cssText = "margin:10px 0;padding:8px 10px;border-radius:12px;border:1px solid #dbeafe;background:#eff6ff;color:#1e40af;font:12px/1.4 system-ui;";
      const btn = document.querySelector("button[type='submit'],button");
      (btn?.parentElement || document.body).appendChild(el);
    }
    el.textContent = message;
    el.dataset.ok = ok ? "true" : "false";
  }

  function safeCopy(input) {
    const out = {};
    for (const [key, value] of Object.entries(input || {})) {
      const k = String(key).toLowerCase();
      if (k.includes("pass") || k.includes("secret") || k.includes("token")) continue;
      out[key] = value;
    }
    out.redacted = true;
    return out;
  }

  function formObject(form) {
    const obj = {};
    if (form) {
      const fd = new FormData(form);
      for (const [key, value] of fd.entries()) obj[key] = value;
    }

    let saved = {};
    try { saved = JSON.parse(localStorage.getItem("smartwork_request") || "{}"); } catch {}

    const merged = { ...saved, ...obj };
    const safeRequest = safeCopy(merged);
    const startDate = merged.startDate || merged.dariTanggal || merged.fromDate || merged.tanggalMulai || merged["start-date"] || "";
    const endDate = merged.endDate || merged.keTanggal || merged.toDate || merged.tanggalSelesai || merged["end-date"] || "";
    const accountRef = merged.accountId || merged.teacherId || "guru-001";
    const jobId = merged.jobId || "phase5v-app-dry-run-" + Date.now();

    return {
      jobId,
      type: "siaga-attendance",
      source: "smartwork-app-request-form",
      phase: PHASE,
      mode: "SMARTWORK_PRODUCTION_QUEUE_API_NATIVE",
      dryRun: true,
      noSiagaInput: true,
      noBrowserOpen: true,
      noRealSave: true,
      noRealSend: true,
      request: {
        ...safeRequest,
        jobId,
        startDate,
        endDate,
        dryRun: true,
        noSiagaInput: true,
        noBrowserOpen: true,
        noRealSave: true,
        noRealSend: true
      },
      accounts: [
        {
          id: accountRef,
          name: merged.name || merged.nama || merged.requesterName || "Nazrin",
          email: merged.email || "",
          whatsapp: merged.whatsapp || merged.wa || "",
          accountRef,
          credentialRef: accountRef,
          startDate,
          endDate,
          dryRun: true
        }
      ],
      safety: {
        dryRun: true,
        noSiagaInput: true,
        noBrowserOpen: true,
        noRealSave: true,
        noRealSend: true
      }
    };
  }

  async function readHealth() {
    const res = await fetch(API_BASE + HEALTH_PATH, { method: "GET", mode: "cors" });
    const json = await res.json();
    const safety = json.safety || json;
    const required = ["dryRun", "noSiagaInput", "noBrowserOpen", "noRealSave", "noRealSend"];
    const bad = required.filter((k) => safety[k] !== true);
    if (bad.length) throw new Error("VPS safety guard failed: " + bad.join(", "));
    return json;
  }

  function firstText(...values) {
    for (const value of values) {
      const text = String(value || "").trim();
      if (text) return text;
    }
    return "";
  }

  function readFormValue(form, names) {
    for (const name of names) {
      const el = form?.querySelector?.(`[name="${name}"], #${name}`);
      const value = String(el?.value || "").trim();
      if (value) return value;
    }
    return "";
  }

  function normalizeVpsJobPayload(payload, form) {
    if (!payload || typeof payload !== "object") {
      throw new Error("invalid_vps_job_payload");
    }

    const request = payload.request && typeof payload.request === "object" ? payload.request : {};
    const range = payload.requestRange && typeof payload.requestRange === "object" ? payload.requestRange : {};
    const requestRange = request.requestRange && typeof request.requestRange === "object" ? request.requestRange : {};
    const firstAccount = Array.isArray(payload.accounts) && payload.accounts[0] && typeof payload.accounts[0] === "object"
      ? payload.accounts[0]
      : null;

    const startDate = firstText(
      payload.startDate,
      range.startDate,
      request.startDate,
      requestRange.startDate,
      firstAccount?.startDate,
      readFormValue(form, ["startDate", "tanggalMulai", "fromDate", "dateStart"])
    );

    const endDate = firstText(
      payload.endDate,
      range.endDate,
      request.endDate,
      requestRange.endDate,
      firstAccount?.endDate,
      readFormValue(form, ["endDate", "tanggalSelesai", "toDate", "dateEnd"])
    );

    if (!startDate || !endDate) {
      throw new Error("missing_request_range_for_vps_job_payload");
    }

    payload.startDate = startDate;
    payload.endDate = endDate;
    payload.requestRange = {
      ...range,
      startDate,
      endDate
    };

    payload.request = {
      ...request,
      startDate,
      endDate,
      requestRange: {
        ...requestRange,
        startDate,
        endDate
      }
    };

    if (firstAccount) {
      firstAccount.startDate = startDate;
      firstAccount.endDate = endDate;
    } else {
      payload.accounts = [
        {
          id: payload.accountId || request.accountId || "guru-001",
          name: payload.teacherName || request.teacherName || "Nazrin",
          startDate,
          endDate
        }
      ];
    }

    payload.safety = {
      ...(payload.safety || {}),
      dryRun: true,
      noSiagaInput: true,
      noBrowserOpen: true,
      noRealSave: true,
      noRealSend: true
    };

    return payload;
  }

  async function postToVps(payload) {
    let lastError = null;

    for (const apiPath of SUBMIT_PATHS) {
      try {
        const res = await fetch(API_BASE + apiPath, {
          method: "POST",
          mode: "cors",
          keepalive: true,
          headers: {
            "Content-Type": "application/json",
            "X-SmartWork-Dry-Run": "true",
            "X-SmartWork-No-Siaga-Input": "true",
            "X-SmartWork-No-Browser-Open": "true",
            "X-SmartWork-No-Real-Save": "true",
            "X-SmartWork-No-Real-Send": "true"
          },
          body: JSON.stringify(payload)
        });

        const text = await res.text();
        let json = null;
        try { json = JSON.parse(text); } catch {}

        if (res.ok) return { ok: true, path: apiPath, status: res.status, json, text };
        lastError = new Error(apiPath + " returned HTTP " + res.status + " " + text.slice(0, 300));
      } catch (err) {
        lastError = err;
      }
    }

    throw lastError || new Error("All VPS submit endpoints failed.");
  }

  async function submitDryRun(form) {
    status("Mengirim request dry-run ke VPS queue...");
    let healthBefore = null;
    try {
      healthBefore = await readHealth();
    } catch (err) {
      healthBefore = {
        ok: false,
        nonBlocking: true,
        phase: PHASE,
        error: String(err?.stack || err)
      };
      console.warn("[SmartWork Phase 5V] VPS health precheck failed but submit continues", err);
    }
    const payload = normalizeVpsJobPayload(formObject(form), form);
    localStorage.setItem("smartwork_request", JSON.stringify(payload.request));
    localStorage.setItem("smartwork_active_job_id", payload.jobId);

    const submit = await postToVps(payload);
    const createdJobId =
      submit?.json?.jobId ||
      submit?.json?.id ||
      submit?.json?.job?.id ||
      submit?.jobId ||
      submit?.job?.id ||
      payload.jobId;

    localStorage.setItem("smartwork_active_job_id", createdJobId);
    localStorage.setItem("smartwork_production_job_id", createdJobId);
    localStorage.setItem("smartwork_production_job", JSON.stringify({
      jobId: createdJobId,
      job: submit?.json?.job || submit?.job || null,
      submit
    }));

    const proof = {
      ok: true,
      phase: PHASE,
      apiBase: API_BASE,
      jobId: createdJobId,
      submit,
      healthBefore,
      submittedAt: new Date().toISOString(),
      safety: payload.safety
    };

    localStorage.setItem("smartwork_vps_last_submit", JSON.stringify(proof));
    status("Request dry-run masuk VPS queue: " + createdJobId);
    window.dispatchEvent(new CustomEvent("smartwork:vps-submit-ok", { detail: proof }));
    return proof;
  }

  function isPlainPayloadObject(input) {
    return Boolean(
      input &&
      typeof input === "object" &&
      !(input instanceof HTMLFormElement) &&
      !("nodeType" in input)
    );
  }

  async function submit(input) {
    if (isPlainPayloadObject(input)) {
      const payload = normalizeVpsJobPayload({ ...input }, null);

      if (!payload.jobId) {
        payload.jobId =
          payload.id ||
          payload.request?.jobId ||
          "phase5zc-app-browser-e2e-" + Date.now();
      }

      payload.request = {
        ...(payload.request || {}),
        jobId: payload.jobId,
        startDate: payload.startDate,
        endDate: payload.endDate
      };

      localStorage.setItem("smartwork_request", JSON.stringify(payload.request));
      localStorage.setItem("smartwork_active_job_id", payload.jobId);

      status("Mengirim request dry-run payload ke VPS queue...");
      let healthBefore = null;
      try {
        healthBefore = await readHealth();
      } catch (err) {
        healthBefore = {
          ok: false,
          nonBlocking: true,
          phase: PHASE,
          error: String(err?.stack || err)
        };
        console.warn("[SmartWork Phase 5V] VPS health precheck failed but submit continues", err);
      }
      const submit = await postToVps(payload);
      const createdJobId =
        submit?.json?.jobId ||
        submit?.json?.id ||
        submit?.json?.job?.id ||
        submit?.jobId ||
        submit?.job?.id ||
        submit?.id ||
        payload.jobId;

      localStorage.setItem("smartwork_active_job_id", createdJobId);
      localStorage.setItem("smartwork_production_job_id", createdJobId);
      localStorage.setItem("smartwork_production_job", JSON.stringify({ jobId: createdJobId, job: submit?.job || null }));

      const proof = {
        ok: true,
        phase: PHASE,
        apiBase: API_BASE,
        jobId: createdJobId,
        submit,
        healthBefore,
        submittedAt: new Date().toISOString(),
        safety: payload.safety
      };

      localStorage.setItem("smartwork_vps_last_submit", JSON.stringify(proof));
      status("Request dry-run payload masuk VPS queue: " + createdJobId);
      window.dispatchEvent(new CustomEvent("smartwork:vps-submit-ok", { detail: proof }));
      return proof;
    }

    const targetForm =
      input instanceof HTMLFormElement
        ? input
        : document.getElementById("requestForm");

    if (!targetForm) {
      throw new Error("request_form_not_found_for_vps_submit");
    }

    return submitDryRun(targetForm);
  }

  window.SmartWorkVpsApi = {
    base: API_BASE,
    health: readHealth,
    submit,
    submitDryRun,
    submitJob: submit,
    createJob: submit
  };

  document.addEventListener("submit", (event) => {
    const form = event.target;
    if (!(form instanceof HTMLFormElement)) return;
    submitDryRun(form).catch((err) => {
      console.error("[SmartWork Phase 5V] VPS submit failed", err);
      status("VPS submit gagal: " + err.message, false);
    });
  }, true);

  document.addEventListener("DOMContentLoaded", () => {});
})();
</script>

<script id="smartwork-request-date-picker-click-v1-script">
(() => {
  function isDateLikeInput(el) {
    if (!el || el.tagName !== "INPUT") return false;
    const type = String(el.getAttribute("type") || "").toLowerCase();
    const placeholder = String(el.getAttribute("placeholder") || "").toLowerCase();
    return type === "date" || placeholder.includes("dd/mm/yyyy") || placeholder.includes("dd / mm / yyyy");
  }

  function openDatePicker(input) {
    if (!input || input.disabled || input.readOnly) return;

    input.focus({ preventScroll: true });

    if (typeof input.showPicker === "function") {
      try {
        input.showPicker();
      } catch (_) {
        // Browser may block showPicker except during direct user activation.
      }
    }
  }

  function bindDatePickerClick() {
    document.querySelectorAll("input").forEach((input) => {
      if (!isDateLikeInput(input)) return;
      if (input.dataset.smartworkDatePickerClick === "true") return;

      input.dataset.smartworkDatePickerClick = "true";
      input.style.cursor = "pointer";

      input.addEventListener("click", () => openDatePicker(input));
      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openDatePicker(input);
        }
      });
    });
  }

  document.addEventListener("DOMContentLoaded", bindDatePickerClick);
  window.addEventListener("load", bindDatePickerClick);
  setTimeout(bindDatePickerClick, 150);
  setTimeout(bindDatePickerClick, 700);
})();

<style id="smartwork-request-hide-report-check-v2-style">
  .smartwork-report-check-hidden-v2 {
    display: none !important;
  }
</style>

<script id="smartwork-request-hide-report-check-v2-script">
(() => {
  function textOf(el) {
    return String(el?.textContent || "").replace(/\s+/g, " ").trim();
  }

  function isTargetText(text) {
    const t = String(text || "").toLowerCase();
    return (
      t.includes("buat laporan") ||
      t.includes("laporan harian/progress") ||
      t.includes("progress setelah agent bekerja")
    );
  }

  function findReportCheckbox() {
    return Array.from(document.querySelectorAll("input[type='checkbox']")).find((input) => {
      let node = input;
      for (let i = 0; i < 7 && node; i++) {
        if (isTargetText(textOf(node))) return true;
        node = node.parentElement;
      }
      return false;
    });
  }

  function findSmallVisualContainer(input) {
    let node = input;
    let best = null;

    for (let i = 0; i < 8 && node; i++) {
      const text = textOf(node);
      const lower = text.toLowerCase();
      const rect = node.getBoundingClientRect();

      const looksLikeTarget =
        isTargetText(text) &&
        !lower.includes("catatan") &&
        !lower.includes("simpan request") &&
        !lower.includes("form request user") &&
        rect.width >= 220 &&
        rect.width <= 440 &&
        rect.height >= 24 &&
        rect.height <= 120;

      if (looksLikeTarget) {
        best = node;
      }

      node = node.parentElement;
    }

    return best || input.closest("label") || input.parentElement;
  }

  function hideReportCheck() {
    const checkbox = findReportCheckbox();
    if (!checkbox) return;

    checkbox.checked = false;
    checkbox.disabled = true;
    checkbox.removeAttribute("checked");
    checkbox.setAttribute("aria-hidden", "true");
    checkbox.tabIndex = -1;

    const box = findSmallVisualContainer(checkbox);
    if (box) {
      box.classList.add("smartwork-report-check-hidden-v2");
      box.setAttribute("aria-hidden", "true");
    }
  }

  document.addEventListener("DOMContentLoaded", hideReportCheck);
  window.addEventListener("load", hideReportCheck);
  setTimeout(hideReportCheck, 50);
  setTimeout(hideReportCheck, 200);
  setTimeout(hideReportCheck, 700);
})();
</script>
<!-- /SMARTWORK_REQUEST_HIDE_REPORT_CHECK_V2 -->

<script id="smartwork-request-edit-delete-actions-v1-script">
(() => {
  const DELETE_EXACT_KEYS = new Set([
    "smartwork_request",
    "smartwork_request_server",
    "smartwork_active_job_id",
    "smartwork_production_job",
    "smartwork_production_job_id",
    "smartwork_production_job_error",
    "smartwork_vps_last_submit",
    "smartwork_progress_live_state",
    "smartwork_progress_reset_at",
    "smartwork_progress_active_range",
    "smartwork_production_progress_state"
  ]);

  function shouldDeleteKey(key) {
    return (
      DELETE_EXACT_KEYS.has(key) ||
      key.startsWith("smartwork_progress_") ||
      key.startsWith("smartwork_production_progress_")
    );
  }

  function findForm() {
    return document.getElementById("requestForm") || document.querySelector("form");
  }

  function findSubmitButton(form) {
    return Array.from(form.querySelectorAll("button,input[type='submit']")).find((el) => {
      const text = String(el.textContent || el.value || "").replace(/\s+/g, " ").trim().toLowerCase();
      return el.type === "submit" || text.includes("simpan request");
    });
  }

  function getSavedBox() {
    return document.getElementById("savedBox");
  }

  function enableEditMode(form) {
    form.querySelectorAll("input, textarea, select").forEach((el) => {
      if (el.type === "hidden") return;
      if (el.classList.contains("smartwork-report-check-hidden-v2")) return;
      el.disabled = false;
      el.readOnly = false;
    });

    const first =
      form.querySelector("input[name='name'], input[name='nama'], input:not([type='hidden']):not([type='checkbox']), textarea");

    first?.focus({ preventScroll: false });

    const savedBox = getSavedBox();
    if (savedBox) {
      savedBox.textContent = "Mode edit aktif. Silakan ubah data lalu tekan Simpan Request.";
    }
  }

  function clearWorkedTestingData(form) {
    const confirmed = window.confirm(
      "Hapus data testing yang sudah dikerjakan?\n\nYang dihapus: request tersimpan, job aktif, status progress, dan cache hasil lokal. Username/password/profil tidak dihapus."
    );

    if (!confirmed) return;

    const removed = [];
    for (const key of Object.keys(localStorage)) {
      if (shouldDeleteKey(key)) {
        localStorage.removeItem(key);
        removed.push(key);
      }
    }

    form.querySelectorAll("input, textarea, select").forEach((el) => {
      const name = String(el.name || "").toLowerCase();
      const placeholder = String(el.placeholder || "").toLowerCase();
      const type = String(el.type || "").toLowerCase();

      const shouldClearField =
        type === "date" ||
        name.includes("date") ||
        name.includes("tanggal") ||
        name.includes("holiday") ||
        name.includes("libur") ||
        name.includes("cuti") ||
        name.includes("notes") ||
        name.includes("catatan") ||
        placeholder.includes("catatan") ||
        placeholder.includes("contoh: 3, 4, 5");

      if (shouldClearField) {
        el.value = "";
      }
    });

    const savedBox = getSavedBox();
    if (savedBox) {
      savedBox.textContent = "Data testing/progress sudah dihapus. Username, password, profil, dan API base tetap aman.";
    }

    window.dispatchEvent(new CustomEvent("smartwork:testing-data-cleared", {
      detail: { removedKeys: removed }
    }));
  }

  function installActions() {
    const form = findForm();
    if (!form) return;

    if (form.querySelector(".smartwork-request-submit-actions-v1")) return;

    const submit = findSubmitButton(form);
    if (!submit) return;

    const row = document.createElement("div");
    row.className = "smartwork-request-submit-actions-v1";

    submit.insertAdjacentElement("beforebegin", row);
    row.appendChild(submit);

    const edit = document.createElement("button");
    edit.type = "button";
    edit.className = "smartwork-request-edit-btn-v1";
    edit.textContent = "Edit";
    edit.setAttribute("aria-label", "Edit data request");
    edit.addEventListener("click", () => enableEditMode(form));

    const del = document.createElement("button");
    del.type = "button";
    del.className = "smartwork-request-delete-btn-v1";
    del.textContent = "Hapus Data";
    del.setAttribute("aria-label", "Hapus data testing yang sudah dikerjakan");
    del.addEventListener("click", () => clearWorkedTestingData(form));

    row.appendChild(edit);
    row.appendChild(del);
  }

  document.addEventListener("DOMContentLoaded", installActions);
  window.addEventListener("load", installActions);
  setTimeout(installActions, 100);
  setTimeout(installActions, 700);
})();
</script>
<!-- /SMARTWORK_REQUEST_EDIT_DELETE_ACTIONS_V1 -->
