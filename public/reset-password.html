  <style>
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:"Plus Jakarta Sans",system-ui,sans-serif;background:#eef4fb;color:#0f172a}
    body{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:22px;
      overflow-x:hidden;
      background:
        radial-gradient(circle at 50% 0%, rgba(37,99,235,.18), transparent 32%),
        linear-gradient(180deg,#f7fbff 0%,#eaf1f9 100%);
    }
    .phone{
      width:min(100%,430px);
      min-height:min(860px,100vh - 28px);
      display:grid;
      place-items:center;
    }
    .card{
      width:100%;
      border-radius:28px;
      background:rgba(255,255,255,.92);
      border:1px solid #dbe7f5;
      box-shadow:0 24px 80px rgba(15,23,42,.13);
      padding:28px 24px 24px;
      overflow:hidden;
      position:relative;
    }
    .card:before{
      content:"";
      position:absolute;
      right:-58px;
      top:-58px;
      width:150px;
      height:150px;
      border-radius:999px;
      background:linear-gradient(135deg,rgba(37,99,235,.20),rgba(99,102,241,.06));
    }
    .brand{
      position:relative;
      display:grid;
      justify-items:center;
      gap:8px;
      margin-bottom:22px;
      text-align:center;
    }
    .logo{
      width:76px;
      height:76px;
      object-fit:contain;
      filter:drop-shadow(0 14px 22px rgba(37,99,235,.16));
    }
    .brand h1{
      margin:0;
      font-size:25px;
      line-height:1.1;
      letter-spacing:-.04em;
      font-weight:800;
    }
    .brand h1 span{color:#2563eb}
    .brand p{
      margin:0;
      color:#64748b;
      font-size:12.5px;
      line-height:1.45;
    }
    .panel{
      position:relative;
      display:grid;
      gap:13px;
    }
    .status-pill{
      width:max-content;
      max-width:100%;
      display:inline-flex;
      align-items:center;
      gap:7px;
      padding:7px 10px;
      border-radius:999px;
      background:#eff6ff;
      color:#1d4ed8;
      font-size:11px;
      font-weight:700;
    }
    .dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:#2563eb;
      box-shadow:0 0 0 5px rgba(37,99,235,.10);
    }
    .title{
      margin:0;
      font-size:21px;
      line-height:1.15;
      letter-spacing:-.03em;
      font-weight:800;
    }
    .desc{
      margin:-4px 0 4px;
      color:#64748b;
      font-size:12.5px;
      line-height:1.5;
    }
    .email-box{
      display:flex;
      align-items:center;
      gap:9px;
      min-height:42px;
      padding:10px 12px;
      border-radius:15px;
      border:1px solid #e2e8f0;
      background:#f8fafc;
      color:#334155;
      font-size:12.5px;
      line-height:1.35;
      word-break:break-word;
    }
    .form{display:grid;gap:11px;margin-top:2px}
    label{
      font-size:11px;
      font-weight:800;
      color:#334155;
    }
    .field{
      position:relative;
    }
    input{
      width:100%;
      height:46px;
      border:1px solid #dbe4f0;
      border-radius:15px;
      background:#fff;
      outline:none;
      padding:0 48px 0 13px;
      font-size:13px;
      color:#0f172a;
      transition:.18s ease;
    }
    input:focus{
      border-color:#2563eb;
      box-shadow:0 0 0 4px rgba(37,99,235,.10);
    }
    .eye{
      position:absolute;
      right:8px;
      top:50%;
      transform:translateY(-50%);
      width:34px;
      height:34px;
      border:0;
      border-radius:12px;
      background:#f1f5f9;
      color:#475569;
      cursor:pointer;
      font-size:13px;
      font-weight:800;
    }
    .hint{
      margin:-2px 0 0;
      color:#64748b;
      font-size:11px;
      line-height:1.45;
    }
    .btn{
      height:47px;
      border:0;
      border-radius:16px;
      background:#2563eb;
      color:white;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 12px 24px rgba(37,99,235,.22);
    }
    .btn:disabled{opacity:.65;cursor:wait}
    .back{
      height:43px;
      border:1px solid #dbe4f0;
      border-radius:15px;
      background:#fff;
      color:#2563eb;
      font-size:12.5px;
      font-weight:800;
      cursor:pointer;
      text-decoration:none;
      display:grid;
      place-items:center;
    }
    .msg{
      min-height:20px;
      margin:0;
      font-size:12px;
      line-height:1.45;
      color:#64748b;
    }
    .msg.ok{color:#16a34a}
    .msg.err{color:#dc2626}
    .success{
      display:none;
      gap:12px;
      text-align:center;
      padding:8px 0 0;
    }
    .success.show{display:grid}
    .success-icon{
      margin:auto;
      width:58px;
      height:58px;
      border-radius:999px;
      display:grid;
      place-items:center;
      background:#dcfce7;
      color:#16a34a;
      font-size:28px;
      font-weight:900;
    }
    @media(max-width:380px){
      body{padding:14px}
      .card{border-radius:24px;padding:24px 20px 22px}
      .brand h1{font-size:23px}
    }

<body>
  <main class="phone">
    <section class="card">
      <div class="brand">
        <img class="logo" src="/smartwork-logo.png" alt="SmartWork Agent">
        <h1>smart<span>work-agent</span></h1>
        <p>Kerja lebih smart, hasil lebih maksimal.</p>
      </div>

      <section class="panel" id="resetPanel">
        <div class="status-pill"><i class="dot"></i><span>Reset password</span></div>
        <h2 class="title">Password baru</h2>
        <p class="desc"></p>

        <div class="email-box" id="emailBox">Memeriksa link reset...</div>

        <form class="form" id="resetForm">
          <label for="newPassword">Password baru</label>
          <div class="field">
            <input id="newPassword" type="password" placeholder="Minimal 6 karakter" autocomplete="new-password">
            
          </div>

          <label for="confirmPassword">Ulangi password</label>
          <div class="field">
            <input id="confirmPassword" type="password" placeholder="Ulangi password baru" autocomplete="new-password">
          </div>

          <p class="hint"></p>
          <button class="btn" id="saveBtn" type="submit">Simpan</button>
          <p class="msg" id="message"></p>
        </form>

        <a class="back" href="/index.html">Kembali ke login</a>
      </section>

      <section class="success" id="successPanel">
        <div class="success-icon">✓</div>
        <h2 class="title">Password berhasil</h2>
        <p class="desc">Silakan login kembali.</p>
        <a class="back" id="loginBackLink" href="/index.html?reset=done">Kembali ke login</a>
      </section>
    </section>
  </main>

  <script src="/firebase-config.js"></script>
  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, verifyPasswordResetCode, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const params = new URLSearchParams(window.location.search);
    const oobCode = params.get("oobCode");
    const continueUrl = params.get("continueUrl") || "/index.html?reset=done";

    const emailBox = document.getElementById("emailBox");
    const form = document.getElementById("resetForm");
    const newPassword = document.getElementById("newPassword");
    const confirmPassword = document.getElementById("confirmPassword");
    const saveBtn = document.getElementById("saveBtn");
    const msg = document.getElementById("message");
    const resetPanel = document.getElementById("resetPanel");
    const successPanel = document.getElementById("successPanel");
    const loginBackLink = document.getElementById("loginBackLink");

    let resetEmail = "";

    function setMsg(text, type = "") {
      msg.textContent = text || "";
      msg.className = "msg" + (type ? " " + type : "");
    }

    function getAuthSafe() {
      if (!window.SMARTWORK_FIREBASE_CONFIG) {
        throw new Error("Firebase config belum tersedia.");
      }
      const app = getApps().length ? getApps()[0] : initializeApp(window.SMARTWORK_FIREBASE_CONFIG);
      return getAuth(app);
    }

    function safeLoginUrl() {
      try {
        const url = new URL(continueUrl, window.location.origin);
        if (url.origin !== window.location.origin) return "/index.html?reset=done";
        return url.pathname + url.search;
      } catch {
        return "/index.html?reset=done";
      }
    }

    async function init() {
      try {
        if (!oobCode) {
          emailBox.textContent = "Link reset tidak lengkap.";
          setMsg("Gunakan minimal 6 karakter. Pilih password yang mudah diingat dan tidak mudah ditebak.", "");
          saveBtn.disabled = true;
          return;
        }

        const auth = getAuthSafe();
        resetEmail = await verifyPasswordResetCode(auth, oobCode);
        emailBox.textContent = "Akun: " + resetEmail;
        newPassword.focus();
      } catch (error) {
        console.error("[SmartWork Reset] verify failed", error);
        emailBox.textContent = "Link reset tidak valid atau sudah kedaluwarsa.";
        setMsg("Link reset tidak valid atau sudah kedaluwarsa. Minta link reset baru.", "err");
        saveBtn.disabled = true;
      }
    }

    /* Custom eye removed: use browser native password reveal icon. */

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const pass = newPassword.value || "";
      const confirm = confirmPassword.value || "";

      if (pass.length < 6) {
        setMsg("Password minimal 6 karakter.", "err");
        return;
      }

      if (pass !== confirm) {
        setMsg("Ulangi password belum sama.", "err");
        return;
      }

      try {
        saveBtn.disabled = true;
        setMsg("Menyimpan password baru...", "");

        const auth = getAuthSafe();
        await confirmPasswordReset(auth, oobCode, pass);

        const target = safeLoginUrl();
        loginBackLink.href = target;
        resetPanel.style.display = "none";
        successPanel.classList.add("show");

        setTimeout(() => {
          window.location.href = target;
        }, 1200);
      } catch (error) {
        console.error("[SmartWork Reset] confirm failed", error);
        setMsg("Gagal menyimpan password. Minta link reset baru lalu coba lagi.", "err");
        saveBtn.disabled = false;
      }
    });

    init();
  </script>
</body>
