<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SmartWork Status</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:#f6f8fb;color:#0f172a;padding:12px;font-size:12px}
    .shell{max-width:980px;margin:auto}
    .hero{display:flex;justify-content:space-between;gap:8px;align-items:center;margin-bottom:10px}
    h1{font-size:16px;margin:0;letter-spacing:-.02em}
    h3{font-size:12px;margin:0 0 8px}
    .muted{color:#64748b;font-size:11px;line-height:1.4}
    .actions{display:flex;gap:6px}
    button,a{border:0;border-radius:10px;padding:8px 10px;background:#2563eb;color:white;text-decoration:none;font-weight:700;font-size:11px;cursor:pointer}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
    .card{background:white;border:1px solid #dbe4ef;border-radius:14px;padding:10px;box-shadow:0 8px 22px rgba(15,23,42,.05)}
    .value{font-size:14px;font-weight:800;margin-top:3px;line-height:1.15}
    .main{display:grid;grid-template-columns:1.1fr .9fr;gap:8px}
    .account{display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px;border:1px solid #e2e8f0;border-radius:12px;padding:8px;margin-top:7px;background:#f8fafc}
    .account b{font-size:12px}
    .badge{border-radius:999px;padding:5px 8px;font-size:10px;font-weight:800;white-space:nowrap}
    .ok{background:#dcfce7;color:#166534}
    .warn{background:#fef3c7;color:#92400e}
    .gray{background:#f1f5f9;color:#475569}
    pre{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;border-radius:12px;padding:10px;font-size:10px;max-height:180px;overflow:auto;margin:0}
    p{margin:7px 0;font-size:12px;line-height:1.4}
    @media(max-width:720px){
      body{padding:10px}
      .hero{align-items:flex-start}
      .grid{grid-template-columns:1fr 1fr}
      .main{grid-template-columns:1fr}
      .card{padding:9px;border-radius:13px}
      .value{font-size:13px}
      .account{padding:7px}
      .hide-mobile{display:none}
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="hero">
      <div>
        <h1>SmartWork Status</h1>
        <div class="muted">Preview request SIAGA.</div>
      </div>
      <div class="actions">
        <a href="/">Form</a>
        <button onclick="loadStatus()">Refresh</button>
      </div>
    </div>

    <section class="grid">
      <div class="card"><div class="muted">Service</div><div class="value" id="service">-</div></div>
      <div class="card"><div class="muted">Periode</div><div class="value" id="period">-</div></div>
      <div class="card"><div class="muted">Akun</div><div class="value" id="accounts">-</div></div>
      <div class="card"><div class="muted">Status</div><div class="value" id="status">-</div></div>
    </section>

    <section class="main">
      <div class="card">
        <h3>Daftar Akun</h3>
        <div id="accountList" class="muted">Memuat...</div>
      </div>

      <div class="card">
        <h3>Decision</h3>
        <div id="decision" class="muted">Memuat...</div>
        <h3>Next</h3>
        <div id="next" class="muted">-</div>
      </div>
    </section>

    <div class="card hide-mobile" style="margin-top:8px">
      <h3>Raw JSON</h3>
      <pre id="raw">Memuat...</pre>
    </div>
  </main>

<script>
async function loadStatus(){
  const res = await fetch("/api/status");
  const data = await res.json();

  const job = data.job || {};
  const decision = data.decision || {};
  const plan = data.plan || {};
  const counts = plan.counts || {};
  const list = plan.accounts || [];

  document.getElementById("service").textContent = (job.service || "-").toUpperCase();
  document.getElementById("period").textContent = `${job.targetMonth || "-"} ${job.targetYear || ""}`.trim();
  document.getElementById("accounts").textContent = job.accountCount ?? counts.accountCount ?? "-";
  document.getElementById("status").textContent = decision.status || plan.status || "-";

  document.getElementById("decision").innerHTML = `
    <div class="badge ${decision.status === "JOB_READY_FOR_PROOF_DELIVERY" ? "ok" : "warn"}">${decision.status || "-"}</div>
    <p>${decision.reason || "-"}</p>
    <p><b>Action:</b> ${decision.action || "-"}</p>
  `;

  document.getElementById("next").textContent = data.nextSafeStep || "-";

  document.getElementById("accountList").innerHTML = list.length ? list.map((a) => `
    <div class="account">
      <div>
        <b>${a.teacherName || "-"}</b>
        <div class="muted">${a.teacherId || "-"} • ${a.schoolName || "-"}</div>
        <div class="muted">${a.targetPdfName || "-"}</div>
      </div>
      <div class="badge ${a.pdfExists ? "ok" : "warn"}">${a.status || "-"}</div>
    </div>
  `).join("") : "Belum ada akun.";

  const raw = document.getElementById("raw");
  if (raw) raw.textContent = JSON.stringify(data, null, 2);
}

loadStatus().catch((err) => {
  const raw = document.getElementById("raw");
  if (raw) raw.textContent = err.message || String(err);
});
</script>
</body>
</html>
